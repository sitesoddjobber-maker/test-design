<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カスタマイズ | O bag Japan</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/customizer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" id="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m15 18-6-6 6-6"/></svg>
          <span>戻る</span>
        </a>
      </div>
      <a href="index.html" class="logo">O bag</a>
      <div class="header-right">
        <button class="icon-btn cart-btn" aria-label="カート">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="customizer-page">
    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-steps">
        <button class="progress-step active" data-step="1"><span class="step-dot"></span><span class="step-label">モデル</span></button>
        <button class="progress-step" data-step="2"><span class="step-dot"></span><span class="step-label">カラー</span></button>
        <button class="progress-step" data-step="3"><span class="step-dot"></span><span class="step-label">ハンドル</span></button>
        <button class="progress-step" data-step="4"><span class="step-dot"></span><span class="step-label">インナー</span></button>
        <button class="progress-step" data-step="5"><span class="step-dot"></span><span class="step-label">アクセサリー</span></button>
      </div>
    </div>

    <div class="customizer-layout">
      <!-- Preview -->
      <div class="preview-panel">
        <div class="preview-container" id="previewContainer">
          <div class="preview-layers" id="previewLayers">
            <!-- SVG Bag Preview -->
            <svg class="bag-preview-svg" id="bagPreviewSvg" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
              <!-- Handle -->
              <path id="svgHandle" class="bag-handle" d="M105,95 Q105,45 150,45 Q195,45 195,95" fill="none" stroke="#8a7a6a" stroke-width="6" stroke-linecap="round"/>
              <!-- Body -->
              <path id="svgBody" class="bag-body" d="M60,95 Q60,80 75,80 L225,80 Q240,80 240,95 L240,280 Q240,310 210,310 L90,310 Q60,310 60,280 Z" fill="#c9b99a"/>
              <!-- Inner bag peek -->
              <rect id="svgInner" class="bag-inner" x="75" y="80" width="150" height="30" rx="4" fill="#e0d8c8" opacity="0.8"/>
              <!-- Accessory -->
              <circle id="svgAccessory" class="bag-accessory" cx="220" cy="160" r="12" fill="none" opacity="0"/>
              <!-- Brand text -->
              <text x="150" y="200" text-anchor="middle" font-family="Montserrat" font-size="16" font-weight="600" fill="rgba(255,255,255,0.4)">O bag</text>
            </svg>
            <p class="preview-hint" id="previewHint">モデルを選んでください</p>
          </div>
        </div>
        <div class="price-summary" id="priceSummary">
          <div class="price-breakdown">
            <div class="price-line" id="priceModel"><span>モデル</span><span>&mdash;</span></div>
            <div class="price-line" id="priceBody"><span>ボディカラー</span><span>&mdash;</span></div>
            <div class="price-line" id="priceHandle"><span>ハンドル</span><span>&mdash;</span></div>
            <div class="price-line" id="priceInner"><span>インナーバッグ</span><span>&mdash;</span></div>
            <div class="price-line" id="priceAccessory"><span>アクセサリー</span><span>&mdash;</span></div>
          </div>
          <div class="price-total"><span>合計</span><span id="totalPrice">&yen;0</span></div>
        </div>
      </div>

      <!-- Options -->
      <div class="options-panel">
        <!-- Step 1: Model -->
        <div class="step-panel active" id="step1">
          <div class="step-header">
            <h2 class="step-title">モデルを選ぶ</h2>
            <p class="step-description">あなたのライフスタイルにぴったりの形を。</p>
          </div>
          <div class="model-grid">
            <button class="model-card" data-model="O bag" data-price="8800" data-shape="classic">
              <div class="model-image"><div class="sample-img sample-model sample-model-classic"></div></div>
              <div class="model-info"><h3>O bag</h3><p>アイコニックな定番。たっぷり収納。</p><span class="model-price">&yen;8,800</span></div>
            </button>
            <button class="model-card" data-model="O bag Mini" data-price="6600" data-shape="mini">
              <div class="model-image"><div class="sample-img sample-model sample-model-mini"></div></div>
              <div class="model-info"><h3>O bag Mini</h3><p>コンパクトで毎日のお出かけに。</p><span class="model-price">&yen;6,600</span></div>
            </button>
            <button class="model-card" data-model="O bag Reverse" data-price="9900" data-shape="reverse">
              <div class="model-image"><div class="sample-img sample-model sample-model-reverse"></div></div>
              <div class="model-info"><h3>O bag Reverse</h3><p>ツートーンのモダンなデザイン。</p><span class="model-price">&yen;9,900</span></div>
            </button>
            <button class="model-card" data-model="O bag Square" data-price="7700" data-shape="square">
              <div class="model-image"><div class="sample-img sample-model sample-model-square"></div></div>
              <div class="model-info"><h3>O bag Square</h3><p>ジオメトリックなエレガンス。</p><span class="model-price">&yen;7,700</span></div>
            </button>
            <button class="model-card" data-model="O bag City" data-price="11000" data-shape="city">
              <div class="model-image"><div class="sample-img sample-model sample-model-city"></div></div>
              <div class="model-info"><h3>O bag City</h3><p>都会的なイタリアンスタイル。</p><span class="model-price">&yen;11,000</span></div>
            </button>
            <button class="model-card" data-model="O bag Knit" data-price="12100" data-shape="knit">
              <div class="model-image"><div class="sample-img sample-model sample-model-knit"></div></div>
              <div class="model-info"><h3>O bag Knit</h3><p>ニットの温かみと手作り感。</p><span class="model-price">&yen;12,100</span></div>
            </button>
          </div>
        </div>

        <!-- Step 2: Color -->
        <div class="step-panel" id="step2">
          <div class="step-header">
            <h2 class="step-title">ボディカラーを選ぶ</h2>
            <p class="step-description">EVA素材のシグネチャーカラーから。</p>
          </div>
          <div class="color-grid" id="bodyColorGrid">
            <button class="color-swatch" data-color="ブラック" data-hex="#1a1815" data-price="0"><span class="swatch" style="background:#1a1815"></span><span class="color-name">ブラック</span></button>
            <button class="color-swatch" data-color="ネイビー" data-hex="#1e2a3a" data-price="0"><span class="swatch" style="background:#1e2a3a"></span><span class="color-name">ネイビー</span></button>
            <button class="color-swatch" data-color="セージグリーン" data-hex="#8a9a7b" data-price="0"><span class="swatch" style="background:#8a9a7b"></span><span class="color-name">セージ</span></button>
            <button class="color-swatch" data-color="アイボリー" data-hex="#f0ebe0" data-price="0"><span class="swatch" style="background:#f0ebe0;border:1px solid #ddd"></span><span class="color-name">アイボリー</span></button>
            <button class="color-swatch" data-color="ブラッシュピンク" data-hex="#e8c4c4" data-price="0"><span class="swatch" style="background:#e8c4c4"></span><span class="color-name">ピンク</span></button>
            <button class="color-swatch" data-color="テラコッタ" data-hex="#c67d5b" data-price="0"><span class="swatch" style="background:#c67d5b"></span><span class="color-name">テラコッタ</span></button>
            <button class="color-swatch" data-color="ラベンダー" data-hex="#b5a7d1" data-price="0"><span class="swatch" style="background:#b5a7d1"></span><span class="color-name">ラベンダー</span></button>
            <button class="color-swatch" data-color="サンド" data-hex="#c9b99a" data-price="0"><span class="swatch" style="background:#c9b99a"></span><span class="color-name">サンド</span></button>
            <button class="color-swatch" data-color="レッド" data-hex="#c44040" data-price="0"><span class="swatch" style="background:#c44040"></span><span class="color-name">レッド</span></button>
            <button class="color-swatch" data-color="スカイブルー" data-hex="#8bb8d4" data-price="0"><span class="swatch" style="background:#8bb8d4"></span><span class="color-name">スカイブルー</span></button>
          </div>
        </div>

        <!-- Step 3: Handle -->
        <div class="step-panel" id="step3">
          <div class="step-header">
            <h2 class="step-title">ハンドルを選ぶ</h2>
            <p class="step-description">スタイルに合うハンドルで完成度アップ。</p>
          </div>
          <div class="handle-grid" id="handleGrid">
            <button class="option-card" data-handle="ショートフラット" data-price="3300" data-handle-color="#6b6560">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-short"></div></div>
              <div class="option-info"><h3>ショートフラットハンドル</h3><p>クラシックなレザーストラップ。手持ちに。</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-handle="ロングストラップ" data-price="4400" data-handle-color="#8a7a6a">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-long"></div></div>
              <div class="option-info"><h3>ロングショルダーストラップ</h3><p>長さ調節可能。斜めがけ・肩がけに。</p><span class="option-price">&yen;4,400</span></div>
            </button>
            <button class="option-card" data-handle="ロープ" data-price="2750" data-handle-color="#c9b99a">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-rope"></div></div>
              <div class="option-info"><h3>ロープハンドル</h3><p>カジュアルな編みロープ。</p><span class="option-price">&yen;2,750</span></div>
            </button>
            <button class="option-card" data-handle="チェーン" data-price="5500" data-handle-color="#b0a898">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-chain"></div></div>
              <div class="option-info"><h3>チェーンストラップ</h3><p>メタリックチェーン。夜のお出かけに。</p><span class="option-price">&yen;5,500</span></div>
            </button>
            <button class="option-card" data-handle="チューブラー" data-price="3850" data-handle-color="#5a5048">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-tube"></div></div>
              <div class="option-info"><h3>チューブラーハンドル</h3><p>丸みのあるモダンなプロファイル。</p><span class="option-price">&yen;3,850</span></div>
            </button>
          </div>
        </div>

        <!-- Step 4: Inner -->
        <div class="step-panel" id="step4">
          <div class="step-header">
            <h2 class="step-title">インナーバッグを選ぶ</h2>
            <p class="step-description">機能性とスタイルの仕上げ。</p>
          </div>
          <div class="inner-grid" id="innerGrid">
            <button class="option-card" data-inner="キャンバス・ナチュラル" data-price="3300" data-inner-color="#e8e0d0">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-natural"></div></div>
              <div class="option-info"><h3>キャンバス - ナチュラル</h3><p>オーガニックコットン、スナップ留め。</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-inner="キャンバス・ブラック" data-price="3300" data-inner-color="#3a3632">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-black"></div></div>
              <div class="option-info"><h3>キャンバス - ブラック</h3><p>クリーンなブラックインテリア。</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-inner="ジップ・ブラック" data-price="4950" data-inner-color="#2a2725">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-zip-bk"></div></div>
              <div class="option-info"><h3>ジップインナー - ブラック</h3><p>ファスナー付き、内ポケットあり。</p><span class="option-price">&yen;4,950</span></div>
            </button>
            <button class="option-card" data-inner="ジップ・ベージュ" data-price="4950" data-inner-color="#d4c5b0">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-zip-bg"></div></div>
              <div class="option-info"><h3>ジップインナー - ベージュ</h3><p>温かみのあるベージュ、ファスナー付き。</p><span class="option-price">&yen;4,950</span></div>
            </button>
            <button class="option-card" data-inner="キルト" data-price="6050" data-inner-color="#c0b8a8">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-quilted"></div></div>
              <div class="option-info"><h3>キルトインナー</h3><p>パッド入りキルティングで大切な物を守る。</p><span class="option-price">&yen;6,050</span></div>
            </button>
          </div>
        </div>

        <!-- Step 5: Accessories -->
        <div class="step-panel" id="step5">
          <div class="step-header">
            <h2 class="step-title">アクセサリーを追加</h2>
            <p class="step-description">お好みで仕上げのタッチを。複数選択OK。</p>
          </div>
          <div class="accessory-grid" id="accessoryGrid">
            <button class="option-card multi-select" data-accessory="フラワーチャーム" data-price="1650">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-flower"></div></div>
              <div class="option-info"><h3>フラワーチャーム</h3><p>シーズナルカラーのシリコンフラワー。</p><span class="option-price">&yen;1,650</span></div>
              <div class="check-indicator"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-accessory="レターチャーム" data-price="1100">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-letter"></div></div>
              <div class="option-info"><h3>レターチャーム</h3><p>イニシャルで自分らしく。A〜Z。</p><span class="option-price">&yen;1,100</span></div>
              <div class="check-indicator"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-accessory="シルクスカーフ" data-price="3850">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-scarf"></div></div>
              <div class="option-info"><h3>シルクスカーフ</h3><p>ハンドルに巻くパリジャンスタイル。</p><span class="option-price">&yen;3,850</span></div>
              <div class="check-indicator"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-accessory="デコラティブトリム" data-price="2200">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-trim"></div></div>
              <div class="option-info"><h3>デコラティブトリム</h3><p>ボディのフレームを彩るスナップ式。</p><span class="option-price">&yen;2,200</span></div>
              <div class="check-indicator"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
          </div>
          <p class="skip-note">アクセサリー不要の場合はそのまま「完了」を押してください。</p>
        </div>

        <!-- Nav -->
        <div class="step-navigation">
          <button class="btn btn-outline nav-prev" id="prevBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m15 18-6-6 6-6"/></svg>
            戻る
          </button>
          <button class="btn btn-primary nav-next" id="nextBtn">
            次へ
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Completion Modal -->
    <div class="completion-modal" id="completionModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h2>あなたのO bagが完成しました！</h2>
        <div class="modal-summary" id="modalSummary"></div>
        <div class="modal-total"><span>合計</span><span id="modalTotalPrice"></span></div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="alert('デザインプレビューのため、購入機能はありません。')">カートに追加</button>
          <button class="btn btn-outline" id="resetBtn">最初からやり直す</button>
          <a href="index.html" class="btn btn-outline" style="text-decoration:none;">トップページに戻る</a>
        </div>
      </div>
    </div>
  </main>

  <nav class="mobile-bottom-nav customizer-bottom-nav">
    <div class="mobile-price-bar">
      <span class="mobile-price-label">合計</span>
      <span class="mobile-price-value" id="mobileTotalPrice">&yen;0</span>
    </div>
  </nav>

  <script src="js/customizer.js"></script>
</body>
</html>
