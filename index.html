<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デザイン閲覧</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --off-white: #f8f7f5;
      --near-black: #1a1816;
      --dark-gray: #555250;
      --mid-gray: #8a8580;
      --gold: #c9a96e;
      --gold-dark: #a68a4b;
    }

    body {
      font-family: 'Noto Sans JP', 'Montserrat', sans-serif;
      background: var(--off-white);
      color: var(--near-black);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 64px 24px 24px;
    }
    .header-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--near-black);
      margin-bottom: 8px;
    }
    .header-sub {
      font-size: 0.78rem;
      color: var(--mid-gray);
      letter-spacing: 0.08em;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 32px auto;
    }


    /* Cards Grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    /* Thumbnail */
    .card-thumb {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover .card-thumb img {
      transform: scale(1.04);
    }
    .card-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: var(--white);
      color: var(--near-black);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
    }

    /* Card Info */
    .card-info {
      padding: 28px 24px 32px;
    }
    .card-info h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .card-info p {
      font-size: 0.82rem;
      color: var(--dark-gray);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--gold-dark);
      transition: gap 0.3s ease;
    }
    .card:hover .card-link {
      gap: 10px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 24px 48px;
      border-top: 1px solid #e8e5e0;
    }
    .footer p {
      font-size: 0.72rem;
      color: var(--mid-gray);
      letter-spacing: 0.04em;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .cards {
        grid-template-columns: 1fr;
        max-width: 420px;
        gap: 24px;
        padding: 0 20px 60px;
      }
      .header { padding: 48px 20px 20px; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
        max-width: 720px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">テストデザイン閲覧用</div>
  </header>

  <div class="divider"></div>

  <div class="cards">

    <a href="portfolio-1/index.html" class="card">
      <div class="card-thumb">
        <img src="images/obag-official/hero-1.webp" alt="Portfolio 1 プレビュー" loading="lazy">
        <span class="card-badge">A</span>
      </div>
      <div class="card-info">
        <h2>Pattern A</h2>
        <span class="card-link">デザインを見る <span>&rarr;</span></span>
      </div>
    </a>

    <a href="portfolio-2/index.html" class="card">
      <div class="card-thumb">
        <img src="images/obag-official/section-4-desktop.webp" alt="Portfolio 2 プレビュー" loading="lazy">
        <span class="card-badge">B</span>
      </div>
      <div class="card-info">
        <h2>Pattern B</h2>
        <span class="card-link">デザインを見る <span>&rarr;</span></span>
      </div>
    </a>

    <a href="portfolio-3/index.html" class="card">
      <div class="card-thumb">
        <img src="images/obag-official/section-2-desktop.webp" alt="Portfolio 3 プレビュー" loading="lazy">
        <span class="card-badge">C</span>
      </div>
      <div class="card-info">
        <h2>Pattern C</h2>
        <span class="card-link">デザインを見る <span>&rarr;</span></span>
      </div>
    </a>

  </div>

  <footer class="footer">
    <p>&copy; 2026 サイトの万事屋</p>
  </footer>

</body>
</html>
