<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カスタマイズ | O bag Japan</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/customizer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" id="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m15 18-6-6 6-6"/></svg>
          <span>戻る</span>
        </a>
      </div>
      <a href="index.html" class="logo">O bag</a>
      <div class="header-right">
        <button class="icon-btn cart-btn" aria-label="カート">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="customizer-page">
    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-steps">
        <button class="progress-step active" data-step="1"><span class="step-dot"></span><span class="step-label">モデル</span></button>
        <button class="progress-step" data-step="2"><span class="step-dot"></span><span class="step-label">カラー</span></button>
        <button class="progress-step" data-step="3"><span class="step-dot"></span><span class="step-label">ハンドル</span></button>
        <button class="progress-step" data-step="4"><span class="step-dot"></span><span class="step-label">インナー</span></button>
        <button class="progress-step" data-step="5"><span class="step-dot"></span><span class="step-label">アクセサリー</span></button>
      </div>
    </div>

    <div class="customizer-layout">
      <!-- Preview -->
      <div class="preview-panel">
        <div class="preview-container">
          <div class="preview-layers">
            <svg class="bag-preview-svg" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="bagShadow" x="-20%" y="-10%" width="140%" height="130%">
                  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
                </filter>
                <pattern id="knitPattern" patternUnits="userSpaceOnUse" width="20" height="8">
                  <rect width="20" height="4" fill="rgba(255,255,255,0.08)"/>
                  <rect y="4" width="20" height="4" fill="rgba(0,0,0,0.05)"/>
                </pattern>
                <pattern id="quiltPattern" patternUnits="userSpaceOnUse" width="24" height="24" patternTransform="rotate(45)">
                  <line x1="0" y1="0" x2="24" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                  <line x1="0" y1="0" x2="0" y2="24" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                </pattern>
                <linearGradient id="bodySheen" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
                  <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
                  <stop offset="100%" stop-color="rgba(0,0,0,0.05)"/>
                </linearGradient>
                <linearGradient id="reverseGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop id="reverseStop1" offset="50%" stop-color="#e8c4b8"/>
                  <stop id="reverseStop2" offset="50%" stop-color="#c9a090"/>
                </linearGradient>
                <clipPath id="bodyClip"><path id="bodyClipPath" d="M60,100 Q60,82 78,82 L222,82 Q240,82 240,100 L240,290 Q240,322 208,322 L92,322 Q60,322 60,290 Z"/></clipPath>
              </defs>

              <!-- Ground shadow -->
              <ellipse id="svgShadow" cx="150" cy="375" rx="90" ry="10" fill="rgba(0,0,0,0.06)"/>

              <!-- Handle group -->
              <g id="svgHandleGroup" filter="url(#bagShadow)">
                <path id="svgHandle" d="M108,100 Q108,48 150,48 Q192,48 192,100" fill="none" stroke="#a87a50" stroke-width="5" stroke-linecap="round"/>
                <!-- Second handle line for flat handles -->
                <path id="svgHandle2" d="M116,100 Q116,58 150,58 Q184,58 184,100" fill="none" stroke="#a87a50" stroke-width="5" stroke-linecap="round" opacity="0"/>
              </g>

              <!-- Body -->
              <g filter="url(#bagShadow)">
                <path id="svgBody" d="M60,100 Q60,82 78,82 L222,82 Q240,82 240,100 L240,290 Q240,322 208,322 L92,322 Q60,322 60,290 Z" fill="#e8c4b8"/>
                <!-- Body sheen overlay -->
                <path id="svgBodySheen" d="M60,100 Q60,82 78,82 L222,82 Q240,82 240,100 L240,290 Q240,322 208,322 L92,322 Q60,322 60,290 Z" fill="url(#bodySheen)"/>
                <!-- Knit texture (hidden by default) -->
                <path id="svgKnitOverlay" d="M60,100 Q60,82 78,82 L222,82 Q240,82 240,100 L240,290 Q240,322 208,322 L92,322 Q60,322 60,290 Z" fill="url(#knitPattern)" opacity="0"/>
                <!-- Reverse divider line -->
                <line id="svgReverseLine" x1="60" y1="200" x2="240" y2="200" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" opacity="0"/>
              </g>

              <!-- Inner bag group -->
              <g id="svgInnerGroup">
                <path id="svgInner" d="M72,82 L72,68 Q72,58 82,58 L218,58 Q228,58 228,68 L228,82" fill="#f0ddd0" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
                <!-- Inner bag fold/flap -->
                <path id="svgInnerFold" d="M78,82 Q150,92 222,82" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
                <!-- Zip line (for zip inners) -->
                <line id="svgInnerZip" x1="100" y1="70" x2="200" y2="70" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0"/>
                <!-- Zip pull -->
                <circle id="svgInnerZipPull" cx="150" cy="70" r="3" fill="rgba(0,0,0,0.2)" opacity="0"/>
                <!-- Quilting overlay -->
                <rect id="svgInnerQuilt" x="72" y="58" width="156" height="24" rx="4" fill="url(#quiltPattern)" clip-path="url(#bodyClip)" opacity="0"/>
              </g>

              <!-- Accessories group -->
              <g id="svgAccessoryGroup">
                <!-- Flower charm -->
                <g id="svgAccFlower" opacity="0" transform="translate(228,140)">
                  <circle cx="0" cy="-8" r="6" fill="#e8c4b8" opacity="0.9"/>
                  <circle cx="7" cy="-2" r="6" fill="#dfc0a0" opacity="0.9"/>
                  <circle cx="4" cy="7" r="6" fill="#e8c4b8" opacity="0.9"/>
                  <circle cx="-4" cy="7" r="6" fill="#dfc0a0" opacity="0.9"/>
                  <circle cx="-7" cy="-2" r="6" fill="#e8c4b8" opacity="0.9"/>
                  <circle cx="0" cy="0" r="4" fill="#c9946e"/>
                  <line x1="0" y1="12" x2="0" y2="28" stroke="#c9946e" stroke-width="1.5"/>
                </g>
                <!-- Letter charm -->
                <g id="svgAccLetter" opacity="0" transform="translate(225,145)">
                  <circle cx="0" cy="0" r="12" fill="none" stroke="#c9946e" stroke-width="1.5"/>
                  <text x="0" y="5" text-anchor="middle" font-family="Montserrat" font-size="13" font-weight="700" fill="#c9946e">A</text>
                  <line x1="0" y1="-12" x2="0" y2="-24" stroke="#c9946e" stroke-width="1"/>
                </g>
                <!-- Scarf on handle -->
                <g id="svgAccScarf" opacity="0">
                  <path d="M120,72 Q115,65 118,55 Q122,45 130,50 Q125,60 128,70" fill="#b5a7d1" opacity="0.7"/>
                  <path d="M122,72 Q130,60 126,48 Q132,42 138,50 Q134,60 132,72" fill="#dfc0a0" opacity="0.6"/>
                </g>
                <!-- Decorative trim on top edge -->
                <g id="svgAccTrim" opacity="0">
                  <path d="M68,100 Q78,92 88,100 Q98,108 108,100 Q118,92 128,100 Q138,108 148,100 Q158,92 168,100 Q178,108 188,100 Q198,92 208,100 Q218,108 228,100 Q238,92 240,100" fill="none" stroke="#c9946e" stroke-width="2" opacity="0.6"/>
                </g>
              </g>

              <!-- Brand watermark -->
              <text x="150" y="215" text-anchor="middle" font-family="Montserrat" font-size="14" font-weight="600" fill="rgba(42,36,34,0.08)" letter-spacing="3">O bag</text>
            </svg>
            <p class="preview-hint" id="previewHint">モデルを選んでください</p>
          </div>
        </div>
        <div class="price-summary">
          <div class="price-breakdown">
            <div class="price-line" id="priceModel"><span>モデル</span><span>&mdash;</span></div>
            <div class="price-line" id="priceBody"><span>ボディカラー</span><span>&mdash;</span></div>
            <div class="price-line" id="priceHandle"><span>ハンドル</span><span>&mdash;</span></div>
            <div class="price-line" id="priceInner"><span>インナーバッグ</span><span>&mdash;</span></div>
            <div class="price-line" id="priceAccessory"><span>アクセサリー</span><span>&mdash;</span></div>
          </div>
          <div class="price-total"><span>合計</span><span id="totalPrice">&yen;0</span></div>
        </div>
      </div>

      <!-- Options -->
      <div class="options-panel">
        <!-- Step 1: Model -->
        <div class="step-panel active" id="step1">
          <div class="step-header">
            <h2 class="step-title">モデルを選ぶ</h2>
            <p class="step-description">あなたのライフスタイルにぴったりの形を。</p>
          </div>
          <div class="model-grid">
            <button class="model-card" data-model="O bag" data-price="8800">
              <div class="model-image"><div class="sample-img sample-model sample-model-classic"></div></div>
              <div class="model-info"><h3>O bag</h3><p>アイコニックな定番。たっぷり収納。</p><span class="model-price">&yen;8,800</span></div>
            </button>
            <button class="model-card" data-model="O bag Mini" data-price="6600">
              <div class="model-image"><div class="sample-img sample-model sample-model-mini"></div></div>
              <div class="model-info"><h3>O bag Mini</h3><p>コンパクトで毎日のお出かけに。</p><span class="model-price">&yen;6,600</span></div>
            </button>
            <button class="model-card" data-model="O bag Reverse" data-price="9900">
              <div class="model-image"><div class="sample-img sample-model sample-model-reverse"></div></div>
              <div class="model-info"><h3>O bag Reverse</h3><p>ツートーンのモダンなデザイン。</p><span class="model-price">&yen;9,900</span></div>
            </button>
            <button class="model-card" data-model="O bag Square" data-price="7700">
              <div class="model-image"><div class="sample-img sample-model sample-model-square"></div></div>
              <div class="model-info"><h3>O bag Square</h3><p>ジオメトリックなエレガンス。</p><span class="model-price">&yen;7,700</span></div>
            </button>
            <button class="model-card" data-model="O bag City" data-price="11000">
              <div class="model-image"><div class="sample-img sample-model sample-model-city"></div></div>
              <div class="model-info"><h3>O bag City</h3><p>都会的なイタリアンスタイル。</p><span class="model-price">&yen;11,000</span></div>
            </button>
            <button class="model-card" data-model="O bag Knit" data-price="12100">
              <div class="model-image"><div class="sample-img sample-model sample-model-knit"></div></div>
              <div class="model-info"><h3>O bag Knit</h3><p>テクスチャーのある温かみ。</p><span class="model-price">&yen;12,100</span></div>
            </button>
          </div>
        </div>

        <!-- Step 2: Color -->
        <div class="step-panel" id="step2">
          <div class="step-header">
            <h2 class="step-title">ボディカラーを選ぶ</h2>
            <p class="step-description">シグネチャーEVA素材、お好みの色で。</p>
          </div>
          <div class="color-grid">
            <button class="color-swatch" data-color="ブラッシュ" data-hex="#e8c4b8" data-price="0"><span class="swatch" style="background:#e8c4b8"></span><span class="color-name">ブラッシュ</span></button>
            <button class="color-swatch" data-color="サンド" data-hex="#c9b99a" data-price="0"><span class="swatch" style="background:#c9b99a"></span><span class="color-name">サンド</span></button>
            <button class="color-swatch" data-color="セージ" data-hex="#8a9a7b" data-price="0"><span class="swatch" style="background:#8a9a7b"></span><span class="color-name">セージ</span></button>
            <button class="color-swatch" data-color="アイボリー" data-hex="#f0ebe0" data-price="0"><span class="swatch" style="background:#f0ebe0;border:1px solid #ddd"></span><span class="color-name">アイボリー</span></button>
            <button class="color-swatch" data-color="ラベンダー" data-hex="#b5a7d1" data-price="0"><span class="swatch" style="background:#b5a7d1"></span><span class="color-name">ラベンダー</span></button>
            <button class="color-swatch" data-color="テラコッタ" data-hex="#c67d5b" data-price="0"><span class="swatch" style="background:#c67d5b"></span><span class="color-name">テラコッタ</span></button>
            <button class="color-swatch" data-color="ネイビー" data-hex="#1e2a3a" data-price="0"><span class="swatch" style="background:#1e2a3a"></span><span class="color-name">ネイビー</span></button>
            <button class="color-swatch" data-color="ブラック" data-hex="#1a1815" data-price="0"><span class="swatch" style="background:#1a1815"></span><span class="color-name">ブラック</span></button>
            <button class="color-swatch" data-color="スカイブルー" data-hex="#8bb8d4" data-price="0"><span class="swatch" style="background:#8bb8d4"></span><span class="color-name">スカイブルー</span></button>
            <button class="color-swatch" data-color="レッド" data-hex="#c44040" data-price="0"><span class="swatch" style="background:#c44040"></span><span class="color-name">レッド</span></button>
          </div>
        </div>

        <!-- Step 3: Handle -->
        <div class="step-panel" id="step3">
          <div class="step-header">
            <h2 class="step-title">ハンドルを選ぶ</h2>
            <p class="step-description">スタイルに合わせたグリップを。</p>
          </div>
          <div class="handle-grid" id="handleGrid">
            <button class="option-card" data-price="3300" data-handle-color="#3a3432">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-short"></div></div>
              <div class="option-info"><h3>ショートフラットハンドル</h3><p>クラシックなレザーストラップ</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-price="4400" data-handle-color="#5a524e">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-long"></div></div>
              <div class="option-info"><h3>ロングショルダーストラップ</h3><p>調節可能なクロスボディ</p><span class="option-price">&yen;4,400</span></div>
            </button>
            <button class="option-card" data-price="2750" data-handle-color="#c9b99a">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-rope"></div></div>
              <div class="option-info"><h3>ロープハンドル</h3><p>ノーティカルな編み込みロープ</p><span class="option-price">&yen;2,750</span></div>
            </button>
            <button class="option-card" data-price="5500" data-handle-color="#c9946e">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-chain"></div></div>
              <div class="option-info"><h3>チェーンストラップ</h3><p>メタリックなイブニングエレガンス</p><span class="option-price">&yen;5,500</span></div>
            </button>
            <button class="option-card" data-price="3850" data-handle-color="#8a7e78">
              <div class="option-image"><div class="sample-img sample-handle sample-handle-tube"></div></div>
              <div class="option-info"><h3>チューブラーハンドル</h3><p>丸みのあるモダンなプロファイル</p><span class="option-price">&yen;3,850</span></div>
            </button>
          </div>
        </div>

        <!-- Step 4: Inner -->
        <div class="step-panel" id="step4">
          <div class="step-header">
            <h2 class="step-title">インナーバッグを選ぶ</h2>
            <p class="step-description">機能性とスタイルの融合。</p>
          </div>
          <div class="inner-grid" id="innerGrid">
            <button class="option-card" data-price="3300" data-inner-color="#f0ddd0">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-natural"></div></div>
              <div class="option-info"><h3>キャンバス - ナチュラル</h3><p>ライトコットン、スナップ留め</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-price="3300" data-inner-color="#3a3432">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-black"></div></div>
              <div class="option-info"><h3>キャンバス - ブラック</h3><p>クリーンなクラシックインテリア</p><span class="option-price">&yen;3,300</span></div>
            </button>
            <button class="option-card" data-price="4950" data-inner-color="#2a2422">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-zip-bk"></div></div>
              <div class="option-info"><h3>ジップインナー - ブラック</h3><p>フルジップ、ポケット付き</p><span class="option-price">&yen;4,950</span></div>
            </button>
            <button class="option-card" data-price="4950" data-inner-color="#dfc0a0">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-zip-bg"></div></div>
              <div class="option-info"><h3>ジップインナー - ベージュ</h3><p>温かみのあるトーン、フルジップ</p><span class="option-price">&yen;4,950</span></div>
            </button>
            <button class="option-card" data-price="6050" data-inner-color="#c9a090">
              <div class="option-image"><div class="sample-img sample-inner sample-inner-quilted"></div></div>
              <div class="option-info"><h3>キルティングインナー</h3><p>パッド入りの保護仕様</p><span class="option-price">&yen;6,050</span></div>
            </button>
          </div>
        </div>

        <!-- Step 5: Accessories -->
        <div class="step-panel" id="step5">
          <div class="step-header">
            <h2 class="step-title">アクセサリーを追加</h2>
            <p class="step-description">仕上げのタッチ。複数選択可。</p>
          </div>
          <div class="accessory-grid" id="accessoryGrid">
            <button class="option-card multi-select" data-price="1650">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-flower"></div></div>
              <div class="option-info"><h3>フラワーチャーム</h3><p>シリコン製、季節のカラー</p><span class="option-price">&yen;1,650</span></div>
              <div class="check-indicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-price="1100">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-letter"></div></div>
              <div class="option-info"><h3>レターチャーム</h3><p>A-Zでパーソナライズ</p><span class="option-price">&yen;1,100</span></div>
              <div class="check-indicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-price="3850">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-scarf"></div></div>
              <div class="option-info"><h3>シルクスカーフ</h3><p>ハンドルラップ、パリジャンタッチ</p><span class="option-price">&yen;3,850</span></div>
              <div class="check-indicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
            <button class="option-card multi-select" data-price="2200">
              <div class="option-image"><div class="sample-img sample-acc sample-acc-trim"></div></div>
              <div class="option-info"><h3>デコラティブトリム</h3><p>スナップオンのフレームトリム</p><span class="option-price">&yen;2,200</span></div>
              <div class="check-indicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
            </button>
          </div>
          <p class="skip-note">アクセサリーが不要な場合は「完了」を押してください。</p>
        </div>

        <!-- Navigation -->
        <div class="step-navigation">
          <button class="btn btn-outline nav-prev" id="prevBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m15 18-6-6 6-6"/></svg>
            戻る
          </button>
          <button class="btn btn-primary nav-next" id="nextBtn">
            次へ
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Completion Modal -->
    <div class="completion-modal" id="completionModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h2>あなたのO bagが完成しました</h2>
        <div class="modal-summary" id="modalSummary"></div>
        <div class="modal-total"><span>合計</span><span id="modalTotalPrice"></span></div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="alert('デザインプレビューのみです。')">カートに追加</button>
